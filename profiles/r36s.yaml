name: r36s
target: r36s
description: Curated low-power handheld profile for R36S (640x480, 3.5").

screen:
  width: 640
  height: 480
  size_inches: 3.5

# Input hardware available on this device.
controls:
  joystick: true          # D-pad
  analogue_sticks: 2      # dual analogue sticks
  buttons: 6              # A B X Y + L R (shoulder)
  mouse: false
  keyboard: false
  spinner: false
  trackball: false
  lightgun: false
  wheel: false

include_systems:
  - amiga
  - mame2003-plus
  - c64
  - cps1
  - cps2
  - cps3
  - gamegear
  - gb
  - gba
  - gbc
  - lynx
  - mastersystem
  - megacd
  - megadrive
  - n64
  - nds
  - neogeo
  - neogeocd
  - nes
  - ngp
  - ngpc
  - pcengine
  - pcenginecd
  - psp
  - psx
  - sega32x
  - snes
  - supergrafx
  - virtualboy
  - wonderswan
  - wonderswancolor
  - zxspectrum

exclude_systems:
  - dreamcast
  - gamecube
  - ps3
  - psvita
  - switch
  - wii
  - wiiu
  - windows
  - xbox

max_games_per_system: 100

preferred_region:
  - USA
  - Europe
  - World
  - Japan

selection:
  include_beta: false
  include_proto: false
  include_hacks: false
  include_translations: true
  arcade_dedupe: true
  arcade_skip_non_playable: true
  # Handhelds have no spinner, trackball, lightgun or steering wheel.
  # Wheel/spinner games are unplayable; lightgun requires a screen you can aim at.
  # Mouse-controlled games are excluded since there is no pointer device.
  arcade_exclude_controls: [wheel, spinner, trackball, lightgun, mouse, pedal]
  # mame_versions filter not needed — mame2003-plus folder already contains
  # exactly the right romset for this hardware.
  # ROMM metadata filters — only applied to ROMs that have a romm-sync record.
  # Games with no ROMM data are never penalised by these filters.
  # year_from: 1980    # only include games released from this year
  # year_to: 2005      # only include games released up to this year
  # min_rating: 60        # skip games with a real IGDB score below this (0 = unrated, always passes)
  # identified_only: true # skip games ROMM considers unidentified
