name: r39max
target: r36s
description: Curated low-power handheld profile for R39 Max (720x720, 4.0").

rsync:
  # dest: root@192.168.1.XXX:/recalbox/share/roms
  # dest: /run/media/erol/SDCARD/roms

screen:
  width: 720
  height: 720
  size_inches: 4.0

# Input hardware available on this device.
controls:
  joystick: true
  analogue_sticks: 2
  buttons: 6
  mouse: false
  keyboard: false
  spinner: false
  trackball: false
  lightgun: false
  wheel: false

include_systems:
  - mame2003-plus
  - c64
  - cps1
  - cps2
  - cps3
  - dreamcast
  - gamegear
  - gb
  - gba
  - gbc
  - lynx
  - mastersystem
  - megadrive
  - n64
  - nds
  - neogeo
  - nes
  - ngp
  - ngpc
  - pcengine
  - saturn
  - sega32x
  - snes
  - supergrafx
  - virtualboy
  - wonderswan
  - wonderswancolor
  - zxspectrum

exclude_systems:
  - gamecube
  - ps3
  - psvita
  - switch
  - wii
  - wiiu
  - windows
  - xbox

max_games_per_system: 4000

preferred_region:
  - USA
  - Europe
  - World
  - Japan

selection:
  include_beta: false
  include_proto: false
  include_hacks: false
  include_translations: true
  arcade_dedupe: true
  arcade_skip_non_playable: true
  arcade_exclude_controls: [wheel, spinner, trackball, lightgun, mouse, pedal]
  # mame_versions filter not needed — mame2003-plus folder already contains
  # exactly the right romset for this hardware.
  # RK3326 compatibility filter — only export ROMs that are known to run acceptably.
  # compat_min_playability levels: Good / Ok / Ok/Medium / Medium / Mediocre
  # ROMs not in the list (compat_include_unlisted: true) are always exported regardless.
  compat_chip: rk3326
  compat_min_playability: Ok
  compat_include_unlisted: true   # games without a compat entry are not penalised
  compat_unlisted_exclude: [atomiswave, naomi, dreamcast, saturn]
  # ROMM metadata filters — only applied to ROMs that have a romm-sync record.
  # Games with no ROMM data are never penalised by these filters.
  # year_from: 1980    # only include games released from this year
  # year_to: 2005      # only include games released up to this year
  # min_rating: 60        # skip games with a real IGDB score below this (0 = unrated, always passes)
  # identified_only: true # skip games ROMM considers unidentified
